<body>

    <header>
        <a href="index.html" class="logo">AdamCorp</a>
        <nav>
            <ul>
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#features">Features</a></li>
                <li><a href="index.html#about">About Us</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
        <a href="index.html" class="cta-header">Sign Up</a>
    </header>

    <main class="signup-main">
        <div class="signup-card">
            <h1 class="signup-heading">Create Your Account</h1>
            <p class="signup-subtext">Fill in your details below to get started. No commitment required.</p>

            <form id="signup-form" novalidate>
                <div class="form-group">
                    <label for="full-name">Full Name</label>
                    <input type="text" id="full-name" placeholder="e.g. Jane Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="e.g. jane@example.com" required>
                </div>
                <div class="form-group">
                    <label for="job-title">Job Title</label>
                    <input type="text" id="job-title" placeholder="e.g. Product Manager">
                </div>
                <div class="form-group">
                    <label for="company">Company</label>
                    <input type="text" id="company" placeholder="e.g. Acme Corp">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Minimum 8 characters" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Repeat your password" required>
                </div>

                <div class="form-checkbox">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                </div>

                <button type="submit" class="cta-primary signup-submit">Create Account</button>
            </form>

            <p class="signup-login-link">Already have an account? <a href="#">Sign in</a></p>
        </div>
    </main>

    <footer>

</body>
